# === SSH Hardening Configuration ===
# Deployed by /hardening skill

# Protocol and Authentication
Protocol 2
PermitRootLogin prohibit-password
MaxAuthTries 3
MaxSessions 3
LoginGraceTime 30

# Disable password authentication (key-only)
PasswordAuthentication no
PermitEmptyPasswords no
ChallengeResponseAuthentication no
KbdInteractiveAuthentication no

# Disable unused authentication methods
KerberosAuthentication no
GSSAPIAuthentication no
HostbasedAuthentication no

# Disable forwarding and tunneling
X11Forwarding no
AllowTcpForwarding no
AllowAgentForwarding no
PermitTunnel no
GatewayPorts no

# Security options
StrictModes yes
IgnoreRhosts yes
UseDNS no
PermitUserEnvironment no
DebianBanner no

# Logging
SyslogFacility AUTH
LogLevel VERBOSE

# Session timeout (5 minutes idle)
ClientAliveInterval 300
ClientAliveCountMax 2

# Strong cryptography
KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com

# SFTP
Subsystem sftp /usr/lib/openssh/sftp-server -f AUTHPRIV -l INFO

# Banner
Banner /etc/issue.net
