# === Systemd Service Hardening Template ===
# Apply as override: /etc/systemd/system/<service>.d/hardening.conf
# Adjust per service — not all directives are compatible with all services
# Test after applying: systemctl restart <service> && systemctl status <service>

[Service]
# --- Filesystem Isolation ---
ProtectSystem=strict
ProtectHome=true
PrivateTmp=yes
PrivateDevices=yes
PrivateMounts=yes

# --- Kernel Protection ---
ProtectKernelModules=yes
ProtectKernelTunables=yes
ProtectControlGroups=yes
ProtectKernelLogs=yes
ProtectHostname=yes
ProtectClock=yes

# --- Privilege Restriction ---
NoNewPrivileges=yes
RestrictSUIDSGID=yes
LockPersonality=yes

# --- Memory Protection ---
MemoryDenyWriteExecute=yes

# --- Namespace & Realtime Restriction ---
RestrictNamespaces=yes
RestrictRealtime=yes

# --- Syscall Filtering ---
SystemCallArchitectures=native

# --- Network Restriction (uncomment if service needs no network) ---
# PrivateNetwork=yes
# IPAddressDeny=any

# --- Capability Restriction (adapt per service) ---
# CapabilityBoundingSet=CAP_NET_BIND_SERVICE
# AmbientCapabilities=CAP_NET_BIND_SERVICE

# --- Read/Write paths (adapt per service) ---
# ReadWritePaths=/var/lib/<service> /var/log/<service>
# ReadOnlyPaths=/etc/<service>

# --- Logging ---
# StandardOutput=journal
# StandardError=journal
# SyslogIdentifier=<service>
